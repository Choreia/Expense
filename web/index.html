<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choreia Expense — レシートをAIで自動仕訳</title>
<meta name="description" content="レシートを撮影するだけでAIが自動仕訳。データはGoogle Sheetsに保存。完全無料・オープンソース。">
<meta property="og:title" content="Choreia Expense — レシートをAIで自動仕訳">
<meta property="og:description" content="レシートを撮影するだけでAIが自動仕訳。データはGoogle Sheetsに保存。完全無料・オープンソース。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://choreia.github.io/Expense/">
<meta property="og:locale" content="ja_JP">
<meta property="og:site_name" content="Choreia">
<meta property="og:image" content="https://choreia.github.io/Expense/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://choreia.github.io/Expense/og-image.png">
<link rel="canonical" href="https://choreia.github.io/Expense/">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline'; connect-src https://www.googleapis.com https://accounts.google.com https://sheets.googleapis.com https://generativelanguage.googleapis.com; frame-src https://accounts.google.com; img-src 'self' https://*.googleusercontent.com data: blob:;">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
  background: #faf8f5;
  color: #2c2418;
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 640px; margin: 0 auto; padding: 16px; }
@media (max-width: 640px) { .container { padding-bottom: 80px; } }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header h1 { font-size: 1.3em; }
.header h1 span { color: #a0522d; }
.auth-area { display: flex; align-items: center; gap: 8px; font-size: 0.85em; }
.auth-area img { width: 28px; height: 28px; border-radius: 50%; }
.btn-google {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px 8px 12px;
  background: #fff;
  color: #3c4043;
  border: 1px solid #dadce0;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Google Sans', Roboto, -apple-system, sans-serif;
  font-weight: 500;
  box-shadow: 0 1px 2px rgba(60,64,67,0.1);
  transition: box-shadow 0.2s, background 0.2s;
}
.btn-google:hover { background: #f7f8f8; box-shadow: 0 1px 3px rgba(60,64,67,0.2); }
.btn-google:active { background: #eee; }
.btn-google svg { flex-shrink: 0; }
.btn-signout {
  padding: 4px 10px;
  background: #f3efe9;
  color: #8a7e6e;
  border: 1px solid #d4cdc2;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8em;
  font-family: inherit;
}

/* Cards */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(44,36,24,0.06);
}
.card h2 {
  font-size: 1.05em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #a0522d;
}

/* Upload area */
.upload-area {
  border: 2px dashed #d4cdc2;
  border-radius: 16px;
  padding: 48px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: #faf8f5;
}
.upload-area:hover, .upload-area.dragover {
  border-color: #a0522d;
  background: #fdf5f0;
}
.upload-icon { font-size: 3em; margin-bottom: 8px; }
.upload-text { color: #8a7e6e; font-size: 0.95em; line-height: 1.6; }

/* Thumbnails */
.thumbnails { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.thumb-wrap { position: relative; }
.thumb-img {
  width: 80px; height: 80px;
  object-fit: cover;
  border-radius: 10px;
  border: 2px solid #e8e2d9;
}
.thumb-remove {
  position: absolute; top: -6px; right: -6px;
  width: 22px; height: 22px;
  background: #d32f2f; color: #fff;
  border: none; border-radius: 50%;
  font-size: 14px; line-height: 22px;
  cursor: pointer;
}

/* Buttons */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: #a0522d;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1.05em;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.btn-primary:hover { background: #8b4526; }
.btn-primary:disabled { background: #d4cdc2; cursor: not-allowed; }
.btn-outline {
  padding: 10px 20px;
  background: #fff;
  color: #a0522d;
  border: 2px solid #a0522d;
  border-radius: 10px;
  font-size: 0.95em;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-outline:hover { background: #fdf5f0; }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }

/* Result items */
.result-item {
  background: #faf8f5;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid #e8e2d9;
}
.result-item .field {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 0.9em;
}
.result-item .field .label { color: #8a7e6e; min-width: 80px; }
.result-item .field .value { font-weight: 600; text-align: right; }
.result-item .amount {
  font-size: 1.3em;
  font-weight: 700;
  color: #a0522d;
  text-align: right;
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px solid #e8e2d9;
}
.result-item select, .result-item input[type="text"], .result-item input[type="date"] {
  padding: 6px 10px;
  border: 1px solid #d4cdc2;
  border-radius: 6px;
  font-size: 0.85em;
  background: #fff;
  font-family: inherit;
  max-width: 200px;
}

/* Status / spinner */
.status { text-align: center; margin-top: 12px; font-size: 0.9em; }
.status.success { color: #4a6741; }
.status.error { color: #d32f2f; }
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 3px solid #e8e2d9;
  border-top-color: #a0522d;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* History table */
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85em;
}
.history-table th {
  text-align: left;
  padding: 8px 6px;
  border-bottom: 2px solid #e8e2d9;
  color: #8a7e6e;
  font-weight: 600;
}
.history-table td {
  padding: 8px 6px;
  border-bottom: 1px solid #f3efe9;
}
.history-table .amount-cell { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }

/* Footer */
footer {
  text-align: center;
  padding: 24px;
  font-size: 0.8em;
  color: #8a7e6e;
}
footer a { color: #a0522d; text-decoration: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  background: #2c2418;
  color: #fff;
  border-radius: 10px;
  font-size: 0.9em;
  z-index: 9999;
  animation: fadeInUp 0.3s ease;
}
.toast.error { background: #d32f2f; }
@keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Empty state */
.empty-state { text-align: center; padding: 32px; color: #8a7e6e; }
.empty-state .icon { font-size: 2.5em; margin-bottom: 8px; }

/* Dashboard */
.dash-tabs {
  display: flex; gap: 0; margin-bottom: 16px;
  background: #f3efe9; border-radius: 10px; padding: 3px;
}
.dash-tab {
  flex: 1; padding: 8px; text-align: center;
  border: none; background: none; border-radius: 8px;
  font-size: 0.85em; font-weight: 600; color: #8a7e6e;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
}
.dash-tab.active { background: #fff; color: #2c2418; box-shadow: 0 1px 3px rgba(44,36,24,0.1); }
.month-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.month-nav button {
  background: none; border: 1px solid #d4cdc2; border-radius: 8px;
  padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 0.9em; color: #2c2418;
}
.month-nav button:hover { background: #f3efe9; }
.month-nav .month-label { font-weight: 700; font-size: 1.1em; }
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row {
  display: flex; align-items: center; gap: 8px; font-size: 0.85em;
}
.bar-label { width: 90px; text-align: right; color: #8a7e6e; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 28px; background: #f3efe9; border-radius: 6px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: 600; color: #fff; min-width: 0; }
.bar-amount { width: 90px; text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.monthly-bars .bar-fill { background: #a0522d; }
.category-bars .bar-fill { background: #4a6741; }
.dash-summary {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
}
.dash-stat {
  background: #faf8f5; border-radius: 10px; padding: 16px; text-align: center;
}
.dash-stat .stat-value { font-size: 1.4em; font-weight: 700; color: #a0522d; }
.dash-stat .stat-label { font-size: 0.8em; color: #8a7e6e; margin-top: 4px; }

/* Tab bar — desktop: inline below header / mobile: fixed bottom */
.tab-bar {
  display: flex;
  background: #fff;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(44,36,24,0.06);
  gap: 4px;
}
.tab-bar-btn {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 10px 8px;
  border: none; background: none; border-radius: 10px;
  font-size: 0.88em; font-weight: 600; font-family: inherit;
  color: #8a7e6e; cursor: pointer; transition: all 0.2s;
}
.tab-bar-btn.active { background: #a0522d; color: #fff; }
.tab-bar-btn .tab-icon { font-size: 1.1em; line-height: 1; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
@media (max-width: 640px) {
  .tab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    border-radius: 0; margin-bottom: 0;
    border-top: 1px solid #e8e2d9;
    box-shadow: 0 -2px 8px rgba(44,36,24,0.06);
    padding: 2px 0;
    padding-bottom: env(safe-area-inset-bottom, 0);
    z-index: 100;
    gap: 0;
  }
  .tab-bar-btn {
    flex-direction: column; gap: 2px;
    padding: 8px 0 6px; font-size: 0.65em; border-radius: 0;
  }
  .tab-bar-btn.active { background: none; color: #a0522d; }
  .tab-bar-btn .tab-icon { font-size: 1.8em; }
}

/* Compliance badge */
.compliance-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; background: #e8f5e9; color: #2e7d32;
  border-radius: 20px; font-size: 0.78em; font-weight: 600; margin-top: 8px;
}
.compliance-badge::before { content: '✓'; font-weight: 700; }

/* Templates */
.template-list { display: flex; flex-direction: column; gap: 8px; }
.template-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; background: #faf8f5; border-radius: 10px; border: 1px solid #e8e2d9;
}
.template-info { flex: 1; }
.template-info .t-name { font-weight: 600; font-size: 0.9em; }
.template-info .t-detail { font-size: 0.78em; color: #8a7e6e; margin-top: 2px; }
.template-actions { display: flex; gap: 6px; }
.template-actions button {
  padding: 6px 12px; border-radius: 6px; border: none;
  font-size: 0.8em; font-family: inherit; cursor: pointer;
}
.btn-template-use { background: #a0522d; color: #fff; }
.btn-template-use:hover { background: #8b4526; }
.btn-template-del { background: #f3efe9; color: #8a7e6e; }
.btn-template-del:hover { background: #e8e2d9; }

/* Print styles */
@media print {
  body { background: #fff; width: auto; }
  .container { max-width: 100%; padding: 0; }
  .header, .card:not(#reportCard), footer, .btn-primary, .btn-outline, .btn-row, .toast, .tab-bar, .compliance-badge { display: none !important; }
  #reportCard { display: block !important; box-shadow: none; border: none; padding: 0; }
  #reportCard h2 { font-size: 1.2em; }
  .report-header { margin-bottom: 24px; }
  .report-header h3 { font-size: 1.1em; }
  .history-table { font-size: 0.8em; }
  .bar-chart { page-break-inside: avoid; }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1><span>Expense</span></h1>
    <div class="auth-area">
      <div id="auth-out">
        <button class="btn-google" onclick="handleSignIn()"><svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.0 24.0 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>ログイン</button>
      </div>
      <div id="auth-in" style="display:none">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
        <button class="btn-signout" onclick="handleSignOut()">ログアウト</button>
      </div>
    </div>
  </div>

  <!-- Tab bar (inline on desktop, fixed bottom on mobile) -->
  <nav class="tab-bar" id="tabBarInline">
    <button class="tab-bar-btn active" onclick="switchTab('scan',this)">
      <span class="tab-icon">&#x1F4F7;</span>読み取り
    </button>
    <button class="tab-bar-btn" onclick="switchTab('dash',this)">
      <span class="tab-icon">&#x1F4CA;</span>ダッシュボード
    </button>
    <button class="tab-bar-btn" onclick="switchTab('tools',this)">
      <span class="tab-icon">&#x1F527;</span>ツール
    </button>
  </nav>

  <!-- Compliance badge -->
  <div class="compliance-badge">電子帳簿保存法対応 — 証憑はGoogle Driveに自動保存</div>

  <!-- ===== Tab 1: 読み取り ===== -->
  <div class="tab-panel active" id="panel-scan">
    <div class="card">
      <h2>レシート読み取り</h2>
      <div class="upload-area" id="dropArea">
        <div class="upload-icon">&#x1F4F7;</div>
        <div class="upload-text">レシートをドラッグ＆ドロップ<br>またはタップして撮影・選択</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" multiple>
      <div class="thumbnails" id="thumbnails"></div>
      <button class="btn-primary" onclick="processReceipts()" id="processBtn" style="margin-top:16px" disabled>
        AIで読み取る
      </button>
      <div class="status" id="processStatus"></div>
    </div>

    <div class="card" id="resultsCard" style="display:none">
      <h2>読み取り結果</h2>
      <div id="results"></div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveToSheets()" id="saveBtn" style="flex:1">Google Sheetsに保存</button>
        <button class="btn-outline" onclick="clearResults()">クリア</button>
      </div>
      <div class="status" id="saveStatus"></div>
    </div>
  </div>

  <!-- ===== Tab 2: ダッシュボード ===== -->
  <div class="tab-panel" id="panel-dash">
    <div class="card">
      <div id="dashLoadMsg" style="text-align:center;padding:32px;color:#8a7e6e"><span class="spinner"></span>読み込み中...</div>
      <div id="dashArea" style="display:none">
        <div class="dash-tabs">
          <button class="dash-tab active" onclick="switchDashTab('monthly',this)">月別推移</button>
          <button class="dash-tab" onclick="switchDashTab('category',this)">カテゴリ別</button>
          <button class="dash-tab" onclick="switchDashTab('history',this)">明細</button>
        </div>

        <div id="dash-monthly">
          <div class="dash-summary" id="dashSummary"></div>
          <div class="month-nav">
            <button onclick="changeYear(-1)">&larr;</button>
            <span class="month-label" id="dashYearLabel"></span>
            <button onclick="changeYear(1)">&rarr;</button>
          </div>
          <div class="bar-chart monthly-bars" id="monthlyChart"></div>
        </div>

        <div id="dash-category" style="display:none">
          <div class="month-nav">
            <button onclick="changeCatMonth(-1)">&larr;</button>
            <span class="month-label" id="catMonthLabel"></span>
            <button onclick="changeCatMonth(1)">&rarr;</button>
          </div>
          <div class="dash-summary" id="catSummary"></div>
          <div class="bar-chart category-bars" id="categoryChart"></div>
        </div>

        <div id="dash-history" style="display:none">
          <div class="month-nav">
            <button onclick="changeHistMonth(-1)">&larr;</button>
            <span class="month-label" id="histMonthLabel"></span>
            <button onclick="changeHistMonth(1)">&rarr;</button>
          </div>
          <div id="historyTable"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Tab 3: ツール ===== -->
  <div class="tab-panel" id="panel-tools">
    <div class="card">
      <h2>テンプレート</h2>
      <p style="font-size:0.85em;color:#8a7e6e;margin-bottom:12px">毎月の固定費（家賃・サブスク等）をワンタップで登録できます。</p>
      <div class="template-list" id="templateList"></div>
      <button class="btn-outline" onclick="showTemplateForm()" style="width:100%;margin-top:8px" id="addTemplateBtn">＋ テンプレートを追加</button>
      <div id="templateForm" style="display:none;margin-top:12px;padding:16px;background:#faf8f5;border-radius:10px;border:1px solid #e8e2d9">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <input type="text" id="tplStore" placeholder="店名・支払先" style="padding:8px;border:1px solid #d4cdc2;border-radius:6px;font-family:inherit;font-size:0.85em">
          <input type="number" id="tplAmount" placeholder="金額" style="padding:8px;border:1px solid #d4cdc2;border-radius:6px;font-family:inherit;font-size:0.85em">
          <select id="tplCategory" style="padding:8px;border:1px solid #d4cdc2;border-radius:6px;font-family:inherit;font-size:0.85em"></select>
          <select id="tplTax" style="padding:8px;border:1px solid #d4cdc2;border-radius:6px;font-family:inherit;font-size:0.85em"></select>
        </div>
        <input type="text" id="tplDesc" placeholder="摘要" style="width:100%;margin-top:8px;padding:8px;border:1px solid #d4cdc2;border-radius:6px;font-family:inherit;font-size:0.85em">
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn-primary" onclick="saveTemplate()" style="flex:1;padding:10px">保存</button>
          <button class="btn-outline" onclick="hideTemplateForm()">キャンセル</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>エクスポート</h2>
      <p style="font-size:0.85em;color:#8a7e6e;margin-bottom:12px">経費データをCSV形式でダウンロードできます。</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn-outline" onclick="exportCSV('generic')">汎用CSV</button>
        <button class="btn-outline" onclick="exportCSV('yayoi')">弥生会計フォーマット</button>
        <button class="btn-outline" onclick="exportCSV('freee')">freeeフォーマット</button>
        <button class="btn-outline" onclick="exportCSV('moneyforward')">マネーフォワードフォーマット</button>
        <button class="btn-outline" onclick="printMonthlyReport()" style="border-color:#4a6741;color:#4a6741">月次レポート印刷 / PDF</button>
      </div>
      <p style="font-size:0.75em;color:#999;margin-top:8px">※ ダッシュボードのデータ読み込み後に使用できます</p>
    </div>

    <footer>
      <a href="https://github.com/Choreia/Expense" target="_blank">GitHub</a> &nbsp;|&nbsp;
      <a href="https://github.com/Choreia/Books" target="_blank">Choreia Books</a> &nbsp;|&nbsp;

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
// ==================== Config ====================
var CLIENT_ID = '267211003481-pck8amdusjfedr9gvvlje4uke53ig4lh.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/generative-language.generativelanguage';
var SPREADSHEET_TITLE = 'Choreia Expense データ';
var SHEET_NAME = '経費';

var tokenClient = null;
var accessToken = null;
var spreadsheetId = null;
var driveFolderId = null; // 電帳法: 証憑保存フォルダ
var pendingImages = []; // {file, dataUrl}
var parsedResults = []; // [{date, store, amount, category, description, tax}]

// ==================== Auth ====================
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: onTokenResponse,
  });
}

async function onTokenResponse(resp) {
  if (resp.error) return;
  accessToken = resp.access_token;
  document.getElementById('auth-out').style.display = 'none';
  document.getElementById('auth-in').style.display = 'flex';
  try {
    var me = await apiFetch('https://www.googleapis.com/oauth2/v3/userinfo');
    document.getElementById('user-name').textContent = me.name || me.email;
    document.getElementById('user-avatar').src = me.picture || '';
  } catch(e) {}
  await findOrCreateSpreadsheet();
  await findOrCreateDriveFolder();
}

function handleSignIn() {
  if (!tokenClient) { showToast('Google認証の準備中です', 'error'); return; }
  tokenClient.requestAccessToken();
}

function handleSignOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null;
  spreadsheetId = null;
  driveFolderId = null;
  document.getElementById('auth-out').style.display = 'block';
  document.getElementById('auth-in').style.display = 'none';
}

// ==================== API helpers ====================
async function apiFetch(url, options) {
  if (!accessToken) throw new Error('未ログイン');
  options = options || {};
  options.headers = options.headers || {};
  options.headers['Authorization'] = 'Bearer ' + accessToken;
  var res = await fetch(url, options);
  if (!res.ok) {
    var text = ''; try { text = await res.text(); } catch(e) {}
    throw new Error('API error ' + res.status + ': ' + text.slice(0, 200));
  }
  return res.json();
}

// ==================== Spreadsheet ====================
async function findOrCreateSpreadsheet() {
  // Search in Drive
  var q = encodeURIComponent("name='" + SPREADSHEET_TITLE + "' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false");
  var search = await apiFetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id,name)');
  if (search.files && search.files.length > 0) {
    spreadsheetId = search.files[0].id;
    return;
  }
  // Create new
  var body = {
    properties: { title: SPREADSHEET_TITLE },
    sheets: [{
      properties: { title: SHEET_NAME },
      data: [{
        startRow: 0, startColumn: 0,
        rowData: [{ values: [
          {userEnteredValue:{stringValue:'日付'}},
          {userEnteredValue:{stringValue:'店名'}},
          {userEnteredValue:{stringValue:'金額'}},
          {userEnteredValue:{stringValue:'勘定科目'}},
          {userEnteredValue:{stringValue:'摘要'}},
          {userEnteredValue:{stringValue:'税区分'}},
          {userEnteredValue:{stringValue:'登録日時'}},
          {userEnteredValue:{stringValue:'証憑URL'}},
        ]}]
      }]
    }]
  };
  var created = await apiFetch('https://sheets.googleapis.com/v4/spreadsheets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  spreadsheetId = created.spreadsheetId;
  showToast('スプレッドシートを作成しました');
}

// ==================== Drive folder (電帳法) ====================
async function findOrCreateDriveFolder() {
  var folderName = 'Choreia Expense 証憑';
  var q = encodeURIComponent("name='" + folderName + "' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  var search = await apiFetch('https://www.googleapis.com/drive/v3/files?q=' + q + '&fields=files(id)');
  if (search.files && search.files.length > 0) {
    driveFolderId = search.files[0].id;
    return;
  }
  var body = { name: folderName, mimeType: 'application/vnd.google-apps.folder' };
  var created = await apiFetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  driveFolderId = created.id;
}

async function uploadReceiptToDrive(dataUrl, storeName, date) {
  if (!driveFolderId) return '';
  var match = dataUrl.match(/^data:(image\/[a-z]+);base64,(.+)$/);
  if (!match) return '';
  var mimeType = match[1];
  var base64Data = match[2];
  var ext = mimeType === 'image/png' ? '.png' : '.jpg';
  var timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  var fileName = date + '_' + storeName.slice(0, 20) + '_' + timestamp + ext;

  var metadata = { name: fileName, parents: [driveFolderId] };
  var boundary = '===choreia_boundary===';
  var body = '--' + boundary + '\r\n' +
    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(metadata) + '\r\n' +
    '--' + boundary + '\r\n' +
    'Content-Type: ' + mimeType + '\r\n' +
    'Content-Transfer-Encoding: base64\r\n\r\n' +
    base64Data + '\r\n' +
    '--' + boundary + '--';

  var res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'multipart/related; boundary=' + boundary,
    },
    body: body,
  });
  if (!res.ok) return '';
  var file = await res.json();
  return file.webViewLink || ('https://drive.google.com/file/d/' + file.id + '/view');
}

// ==================== File handling ====================
var dropArea = null;

function setupDropArea() {
  dropArea = document.getElementById('dropArea');
  var fileInput = document.getElementById('fileInput');

  dropArea.addEventListener('click', function() { fileInput.click(); });
  dropArea.addEventListener('dragover', function(e) { e.preventDefault(); dropArea.classList.add('dragover'); });
  dropArea.addEventListener('dragleave', function() { dropArea.classList.remove('dragover'); });
  dropArea.addEventListener('drop', function(e) {
    e.preventDefault();
    dropArea.classList.remove('dragover');
    addFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', function() { addFiles(fileInput.files); fileInput.value = ''; });
}

function addFiles(files) {
  Array.from(files).forEach(function(file) {
    if (!file.type.startsWith('image/')) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      pendingImages.push({ file: file, dataUrl: e.target.result });
      renderThumbnails();
    };
    reader.readAsDataURL(file);
  });
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  renderThumbnails();
}

function renderThumbnails() {
  var container = document.getElementById('thumbnails');
  container.innerHTML = pendingImages.map(function(img, i) {
    return '<div class="thumb-wrap"><img class="thumb-img" src="' + img.dataUrl + '"><button class="thumb-remove" onclick="removeImage(' + i + ')">×</button></div>';
  }).join('');
  document.getElementById('processBtn').disabled = pendingImages.length === 0;
}

// ==================== Gemini Vision ====================
async function processReceipts() {
  if (!accessToken) { showToast('Googleにログインしてください', 'error'); return; }
  if (pendingImages.length === 0) return;

  var btn = document.getElementById('processBtn');
  var status = document.getElementById('processStatus');
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>AIが読み取り中... (' + pendingImages.length + '枚)';
  parsedResults = [];

  try {
    for (var i = 0; i < pendingImages.length; i++) {
      status.innerHTML = '<span class="spinner"></span>読み取り中... (' + (i + 1) + '/' + pendingImages.length + ')';
      var result = await readReceipt(pendingImages[i].dataUrl);
      if (result) parsedResults.push(result);
    }

    if (parsedResults.length === 0) {
      status.innerHTML = '<span class="error">レシートを読み取れませんでした。画像を確認してください。</span>';
      btn.disabled = false;
      return;
    }

    renderResults();
    status.innerHTML = '<span class="success">' + parsedResults.length + '件読み取り完了</span>';
  } catch(e) {
    status.innerHTML = '<span class="error">エラー: ' + escHtml(e.message) + '</span>';
  }
  btn.disabled = pendingImages.length === 0;
}

async function readReceipt(dataUrl) {
  // Extract base64 data and mime type
  var match = dataUrl.match(/^data:(image\/[a-z]+);base64,(.+)$/);
  if (!match) return null;
  var mimeType = match[1];
  var base64Data = match[2];

  var prompt = '以下のレシート画像を分析して、JSON形式で情報を抽出してください。\n\n' +
    '必ず以下のJSON形式のみを出力してください（説明文不要）:\n' +
    '{"date":"YYYY-MM-DD","store":"店名","amount":金額(数値),"category":"勘定科目","description":"品目の概要","tax":"課税区分"}\n\n' +
    '勘定科目は以下から選択: 旅費交通費, 通信費, 消耗品費, 会議費, 交際費, 新聞図書費, 地代家賃, 水道光熱費, 広告宣伝費, 外注費, 支払手数料, 福利厚生費, 雑費\n' +
    '税区分は: 課税仕入10%, 課税仕入8%(軽減), 非課税, 不課税 から選択\n' +
    '日付が読み取れない場合は今日の日付を使用。金額は税込み総額。';

  var body = {
    contents: [{
      parts: [
        { text: prompt },
        { inlineData: { mimeType: mimeType, data: base64Data } }
      ]
    }],
    generationConfig: {
      temperature: 0.1,
      maxOutputTokens: 1024,
      responseMimeType: 'application/json'
    }
  };

  var response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + accessToken
    },
    body: JSON.stringify(body)
  });

  if (!response.ok) {
    var errText = ''; try { errText = await response.text(); } catch(e) {}
    throw new Error('Gemini API エラー (' + response.status + '): ' + errText.slice(0, 200));
  }

  var data = await response.json();
  var text = data.candidates[0].content.parts[0].text;
  var jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) return null;

  var parsed = JSON.parse(jsonMatch[0]);
  // Validate
  if (!parsed.amount || parsed.amount <= 0) return null;
  parsed.date = parsed.date || new Date().toISOString().slice(0, 10);
  parsed.store = parsed.store || '不明';
  parsed.category = parsed.category || '雑費';
  parsed.description = parsed.description || '';
  parsed.tax = parsed.tax || '課税仕入10%';
  return parsed;
}

// ==================== Results display ====================
var CATEGORIES = ['旅費交通費','通信費','消耗品費','会議費','交際費','新聞図書費','地代家賃','水道光熱費','広告宣伝費','外注費','支払手数料','福利厚生費','雑費'];
var TAX_TYPES = ['課税仕入10%','課税仕入8%(軽減)','非課税','不課税'];

function renderResults() {
  var container = document.getElementById('results');
  container.innerHTML = parsedResults.map(function(r, i) {
    var catOptions = CATEGORIES.map(function(c) { return '<option' + (c === r.category ? ' selected' : '') + '>' + c + '</option>'; }).join('');
    var taxOptions = TAX_TYPES.map(function(t) { return '<option' + (t === r.tax ? ' selected' : '') + '>' + t + '</option>'; }).join('');
    return '<div class="result-item" data-idx="' + i + '">' +
      '<div class="field"><span class="label">日付</span><input type="date" value="' + escHtml(r.date) + '" onchange="parsedResults[' + i + '].date=this.value"></div>' +
      '<div class="field"><span class="label">店名</span><input type="text" value="' + escHtml(r.store) + '" onchange="parsedResults[' + i + '].store=this.value"></div>' +
      '<div class="field"><span class="label">勘定科目</span><select onchange="parsedResults[' + i + '].category=this.value">' + catOptions + '</select></div>' +
      '<div class="field"><span class="label">摘要</span><input type="text" value="' + escHtml(r.description) + '" onchange="parsedResults[' + i + '].description=this.value"></div>' +
      '<div class="field"><span class="label">税区分</span><select onchange="parsedResults[' + i + '].tax=this.value">' + taxOptions + '</select></div>' +
      '<div class="field"><span class="label">金額</span><input type="number" value="' + Number(r.amount) + '" min="0" onchange="parsedResults[' + i + '].amount=Number(this.value)"></div>' +
      '</div>';
  }).join('');
  document.getElementById('resultsCard').style.display = 'block';
}

function clearResults() {
  parsedResults = [];
  pendingImages = [];
  renderThumbnails();
  document.getElementById('results').innerHTML = '';
  document.getElementById('resultsCard').style.display = 'none';
  document.getElementById('processStatus').innerHTML = '';
  document.getElementById('saveStatus').innerHTML = '';
}

// ==================== Save to Sheets ====================
async function saveToSheets() {
  if (!accessToken) { showToast('Googleにログインしてください', 'error'); return; }
  if (!spreadsheetId) { showToast('スプレッドシートが見つかりません', 'error'); return; }
  if (parsedResults.length === 0) return;

  var btn = document.getElementById('saveBtn');
  var status = document.getElementById('saveStatus');
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>保存中...';

  try {
    var now = new Date().toLocaleString('ja-JP');

    // 電帳法: レシート画像をDriveにアップロード
    status.innerHTML = '<span class="spinner"></span>証憑をアップロード中...';
    var driveLinks = [];
    for (var i = 0; i < parsedResults.length; i++) {
      var link = '';
      if (pendingImages[i] && pendingImages[i].dataUrl) {
        link = await uploadReceiptToDrive(pendingImages[i].dataUrl, parsedResults[i].store, parsedResults[i].date);
      }
      driveLinks.push(link);
    }
    status.innerHTML = '<span class="spinner"></span>Sheetsに保存中...';

    var values = parsedResults.map(function(r, idx) {
      return [r.date, r.store, r.amount, r.category, r.description, r.tax, now, driveLinks[idx] || ''];
    });

    await apiFetch('https://sheets.googleapis.com/v4/spreadsheets/' + spreadsheetId + '/values/' + encodeURIComponent(SHEET_NAME) + '!A:H:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: values }),
    });

    var savedWithReceipt = driveLinks.filter(function(l) { return l; }).length;
    var msg = parsedResults.length + '件保存しました';
    if (savedWithReceipt > 0) msg += '（証憑' + savedWithReceipt + '件保存済）';
    status.innerHTML = '<span class="success">' + msg + '</span>';
    showToast(msg);

    // Clear after save
    parsedResults = [];
    pendingImages = [];
    renderThumbnails();
    setTimeout(function() {
      document.getElementById('resultsCard').style.display = 'none';
      document.getElementById('processStatus').innerHTML = '';
    }, 2000);

    loadHistory();
  } catch(e) {
    status.innerHTML = '<span class="error">保存エラー: ' + escHtml(e.message) + '</span>';
  }
  btn.disabled = false;
}

// ==================== History ====================
// ==================== Dashboard ====================
var allExpenseRows = []; // [{date, store, amount, category, description, tax}]
var dashYear = new Date().getFullYear();
var catMonth = new Date().toISOString().slice(0, 7); // YYYY-MM
var histMonth = new Date().toISOString().slice(0, 7);

async function loadDashboard() {
  if (!accessToken || !spreadsheetId) {
    document.getElementById('dashLoadMsg').innerHTML = '<p style="color:#8a7e6e">Googleにログインすると経費データが表示されます</p>';
    return;
  }

  document.getElementById('dashLoadMsg').innerHTML = '<span class="spinner"></span>読み込み中...';
  document.getElementById('dashLoadMsg').style.display = 'block';

  try {
    var data = await apiFetch('https://sheets.googleapis.com/v4/spreadsheets/' + spreadsheetId + '/values/' + encodeURIComponent(SHEET_NAME) + '!A:G');
    var rows = data.values || [];
    if (rows.length <= 1) {
      document.getElementById('dashLoadMsg').innerHTML = '<p style="color:#8a7e6e">まだデータがありません。レシートを読み取って保存してください。</p>';
      return;
    }

    allExpenseRows = rows.slice(1).map(function(r) {
      return { date: r[0] || '', store: r[1] || '', amount: Number(r[2]) || 0, category: r[3] || '', description: r[4] || '', tax: r[5] || '' };
    });

    document.getElementById('dashArea').style.display = 'block';
    document.getElementById('dashLoadMsg').style.display = 'none';
    renderMonthlyView();
  } catch(e) {
    document.getElementById('dashLoadMsg').innerHTML = '<p style="color:#d32f2f">読み込みエラー: ' + escHtml(e.message) + '</p>';
  }
}

function switchDashTab(tab, el) {
  document.querySelectorAll('.dash-tab').forEach(function(t) { t.classList.remove('active'); });
  (el || event.currentTarget).classList.add('active');
  document.getElementById('dash-monthly').style.display = tab === 'monthly' ? 'block' : 'none';
  document.getElementById('dash-category').style.display = tab === 'category' ? 'block' : 'none';
  document.getElementById('dash-history').style.display = tab === 'history' ? 'block' : 'none';
  if (tab === 'monthly') renderMonthlyView();
  if (tab === 'category') renderCategoryView();
  if (tab === 'history') renderHistoryView();
}

// --- Monthly bar chart ---
function changeYear(delta) { dashYear += delta; renderMonthlyView(); }

function renderMonthlyView() {
  var months = {};
  var yearTotal = 0;
  var yearCount = 0;
  for (var m = 1; m <= 12; m++) {
    var key = dashYear + '-' + String(m).padStart(2, '0');
    months[key] = 0;
  }
  allExpenseRows.forEach(function(r) {
    var ym = r.date.slice(0, 7);
    if (ym.startsWith(String(dashYear))) {
      months[ym] = (months[ym] || 0) + r.amount;
      yearTotal += r.amount;
      yearCount++;
    }
  });

  document.getElementById('dashYearLabel').textContent = dashYear + '年';

  // Summary
  var avgMonth = yearCount > 0 ? Math.round(yearTotal / 12) : 0;
  document.getElementById('dashSummary').innerHTML =
    '<div class="dash-stat"><div class="stat-value">¥' + yearTotal.toLocaleString() + '</div><div class="stat-label">' + dashYear + '年 合計</div></div>' +
    '<div class="dash-stat"><div class="stat-value">¥' + avgMonth.toLocaleString() + '</div><div class="stat-label">月平均</div></div>';

  // Chart
  var max = Math.max.apply(null, Object.values(months)) || 1;
  var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var html = '';
  Object.keys(months).sort().forEach(function(key, i) {
    var val = months[key];
    var pct = Math.round(val / max * 100);
    html += '<div class="bar-row">' +
      '<div class="bar-label">' + monthNames[i] + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + Math.max(pct, val > 0 ? 2 : 0) + '%">' + (pct > 15 ? '¥' + val.toLocaleString() : '') + '</div></div>' +
      '<div class="bar-amount">' + (val > 0 ? '¥' + val.toLocaleString() : '-') + '</div>' +
      '</div>';
  });
  document.getElementById('monthlyChart').innerHTML = html;
}

// --- Category view ---
function changeCatMonth(delta) {
  var d = new Date(catMonth + '-01');
  d.setMonth(d.getMonth() + delta);
  catMonth = d.toISOString().slice(0, 7);
  renderCategoryView();
}

function renderCategoryView() {
  var cats = {};
  var total = 0;
  var count = 0;
  allExpenseRows.forEach(function(r) {
    if (r.date.slice(0, 7) === catMonth) {
      cats[r.category] = (cats[r.category] || 0) + r.amount;
      total += r.amount;
      count++;
    }
  });

  var parts = catMonth.split('-');
  document.getElementById('catMonthLabel').textContent = parts[0] + '年' + Number(parts[1]) + '月';

  document.getElementById('catSummary').innerHTML =
    '<div class="dash-stat"><div class="stat-value">¥' + total.toLocaleString() + '</div><div class="stat-label">月合計</div></div>' +
    '<div class="dash-stat"><div class="stat-value">' + count + '件</div><div class="stat-label">取引数</div></div>';

  // Sort by amount descending
  var sorted = Object.entries(cats).sort(function(a, b) { return b[1] - a[1]; });
  var max = sorted.length > 0 ? sorted[0][1] : 1;

  if (sorted.length === 0) {
    document.getElementById('categoryChart').innerHTML = '<div class="empty-state"><p>この月のデータはありません</p></div>';
    return;
  }

  var html = sorted.map(function(entry) {
    var pct = Math.round(entry[1] / max * 100);
    return '<div class="bar-row">' +
      '<div class="bar-label">' + escHtml(entry[0]) + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + Math.max(pct, 2) + '%">' + (pct > 20 ? '¥' + entry[1].toLocaleString() : '') + '</div></div>' +
      '<div class="bar-amount">¥' + entry[1].toLocaleString() + '</div>' +
      '</div>';
  }).join('');
  document.getElementById('categoryChart').innerHTML = html;
}

// --- History list ---
function changeHistMonth(delta) {
  var d = new Date(histMonth + '-01');
  d.setMonth(d.getMonth() + delta);
  histMonth = d.toISOString().slice(0, 7);
  renderHistoryView();
}

function renderHistoryView() {
  var filtered = allExpenseRows.filter(function(r) { return r.date.slice(0, 7) === histMonth; });
  filtered.sort(function(a, b) { return b.date.localeCompare(a.date); });

  var parts = histMonth.split('-');
  document.getElementById('histMonthLabel').textContent = parts[0] + '年' + Number(parts[1]) + '月';

  if (filtered.length === 0) {
    document.getElementById('historyTable').innerHTML = '<div class="empty-state"><p>この月のデータはありません</p></div>';
    return;
  }

  var total = filtered.reduce(function(s, r) { return s + r.amount; }, 0);
  var html = '<div style="text-align:right;font-size:0.9em;margin-bottom:8px;color:#8a7e6e">' + filtered.length + '件 / 合計 <strong style="color:#a0522d">¥' + total.toLocaleString() + '</strong></div>';
  html += '<table class="history-table"><thead><tr><th>日付</th><th>店名</th><th>科目</th><th style="text-align:right">金額</th></tr></thead><tbody>';
  html += filtered.map(function(r) {
    return '<tr><td>' + escHtml(r.date) + '</td><td>' + escHtml(r.store) + '</td><td>' + escHtml(r.category) + '</td><td class="amount-cell">¥' + r.amount.toLocaleString() + '</td></tr>';
  }).join('');
  html += '</tbody></table>';
  document.getElementById('historyTable').innerHTML = html;
}

// Keep old loadHistory as alias
function loadHistory() { loadDashboard(); }

// ==================== Export ====================
function exportCSV(format) {
  if (allExpenseRows.length === 0) { showToast('先にデータを読み込んでください', 'error'); return; }

  var bom = '\uFEFF'; // UTF-8 BOM for Excel
  var lines = [];
  var filename = 'choreia_expense_';

  switch (format) {
    case 'generic':
      lines.push(['日付','店名','金額','勘定科目','摘要','税区分']);
      allExpenseRows.forEach(function(r) {
        lines.push([r.date, r.store, r.amount, r.category, r.description, r.tax]);
      });
      filename += 'generic.csv';
      break;

    case 'yayoi':
      // 弥生会計インポート形式
      lines.push(['日付','借方勘定科目','借方金額','貸方勘定科目','貸方金額','摘要','税区分']);
      allExpenseRows.forEach(function(r) {
        var date = r.date.replace(/-/g, '/');
        lines.push([date, r.category, r.amount, '現金', r.amount, r.store + ' ' + r.description, r.tax]);
      });
      filename += 'yayoi.csv';
      break;

    case 'freee':
      // freee インポート形式
      lines.push(['収支区分','管理番号','発生日','決済期日','取引先','勘定科目','税区分','金額','備考']);
      allExpenseRows.forEach(function(r) {
        var freeTax = r.tax.replace('課税仕入', '課対仕入');
        lines.push(['支出', '', r.date, r.date, r.store, r.category, freeTax, r.amount, r.description]);
      });
      filename += 'freee.csv';
      break;

    case 'moneyforward':
      // マネーフォワード仕訳インポート形式
      lines.push(['取引日','借方勘定科目','借方補助科目','借方税区分','借方金額','貸方勘定科目','貸方補助科目','貸方税区分','貸方金額','摘要']);
      allExpenseRows.forEach(function(r) {
        lines.push([r.date, r.category, '', r.tax, r.amount, '現金', '', '対象外', r.amount, r.store + ' ' + r.description]);
      });
      filename += 'moneyforward.csv';
      break;
  }

  var csv = bom + lines.map(function(row) {
    return row.map(function(cell) {
      var s = String(cell);
      if (s.indexOf(',') >= 0 || s.indexOf('"') >= 0 || s.indexOf('\n') >= 0) {
        return '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }).join(',');
  }).join('\r\n');

  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(format + '形式でダウンロードしました');
}

// ==================== Utilities ====================
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg, type) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// ==================== Templates ====================
function getTemplates() {
  try { return JSON.parse(localStorage.getItem('choreia_expense_templates') || '[]'); } catch(e) { return []; }
}

function saveTemplatesData(templates) {
  localStorage.setItem('choreia_expense_templates', JSON.stringify(templates));
}

function renderTemplates() {
  var templates = getTemplates();
  var container = document.getElementById('templateList');
  if (templates.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:16px"><p style="font-size:0.85em">テンプレートがありません</p></div>';
    return;
  }
  container.innerHTML = templates.map(function(t, i) {
    return '<div class="template-item">' +
      '<div class="template-info"><div class="t-name">' + escHtml(t.store) + ' — ¥' + Number(t.amount).toLocaleString() + '</div>' +
      '<div class="t-detail">' + escHtml(t.category) + ' / ' + escHtml(t.description || '-') + '</div></div>' +
      '<div class="template-actions">' +
      '<button class="btn-template-use" onclick="useTemplate(' + i + ')">登録</button>' +
      '<button class="btn-template-del" onclick="deleteTemplate(' + i + ')">×</button>' +
      '</div></div>';
  }).join('');
}

function showTemplateForm() {
  var form = document.getElementById('templateForm');
  form.style.display = 'block';
  document.getElementById('addTemplateBtn').style.display = 'none';
  // Populate selects
  var catSel = document.getElementById('tplCategory');
  if (catSel.options.length === 0) {
    CATEGORIES.forEach(function(c) { var o = document.createElement('option'); o.textContent = c; catSel.appendChild(o); });
    var taxSel = document.getElementById('tplTax');
    TAX_TYPES.forEach(function(t) { var o = document.createElement('option'); o.textContent = t; taxSel.appendChild(o); });
  }
}

function hideTemplateForm() {
  document.getElementById('templateForm').style.display = 'none';
  document.getElementById('addTemplateBtn').style.display = 'block';
}

function saveTemplate() {
  var store = document.getElementById('tplStore').value.trim();
  var amount = Number(document.getElementById('tplAmount').value);
  if (!store || !amount) { showToast('店名と金額を入力してください', 'error'); return; }
  var templates = getTemplates();
  templates.push({
    store: store,
    amount: amount,
    category: document.getElementById('tplCategory').value,
    tax: document.getElementById('tplTax').value,
    description: document.getElementById('tplDesc').value.trim(),
  });
  saveTemplatesData(templates);
  hideTemplateForm();
  renderTemplates();
  document.getElementById('tplStore').value = '';
  document.getElementById('tplAmount').value = '';
  document.getElementById('tplDesc').value = '';
  showToast('テンプレートを保存しました');
}

function deleteTemplate(idx) {
  var templates = getTemplates();
  templates.splice(idx, 1);
  saveTemplatesData(templates);
  renderTemplates();
}

async function useTemplate(idx) {
  if (!accessToken) { showToast('Googleにログインしてください', 'error'); return; }
  if (!spreadsheetId) { showToast('スプレッドシートが見つかりません', 'error'); return; }
  var t = getTemplates()[idx];
  var now = new Date().toLocaleString('ja-JP');
  var today = new Date().toISOString().slice(0, 10);
  var values = [[today, t.store, t.amount, t.category, t.description, t.tax, now, '']];
  try {
    await apiFetch('https://sheets.googleapis.com/v4/spreadsheets/' + spreadsheetId + '/values/' + encodeURIComponent(SHEET_NAME) + '!A:H:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: values }),
    });
    showToast(t.store + ' ¥' + Number(t.amount).toLocaleString() + ' を登録しました');
  } catch(e) {
    showToast('登録エラー: ' + e.message, 'error');
  }
}

// ==================== Monthly Report (Print/PDF) ====================
function printMonthlyReport() {
  if (allExpenseRows.length === 0) { showToast('先にデータを読み込んでください', 'error'); return; }

  var month = histMonth || new Date().toISOString().slice(0, 7);
  var filtered = allExpenseRows.filter(function(r) { return r.date.slice(0, 7) === month; });
  filtered.sort(function(a, b) { return a.date.localeCompare(b.date); });

  var total = filtered.reduce(function(s, r) { return s + r.amount; }, 0);

  // Category breakdown
  var cats = {};
  filtered.forEach(function(r) { cats[r.category] = (cats[r.category] || 0) + r.amount; });
  var catSorted = Object.entries(cats).sort(function(a, b) { return b[1] - a[1]; });

  var parts = month.split('-');
  var title = parts[0] + '年' + Number(parts[1]) + '月 経費レポート';

  var html = '<div class="report-header">' +
    '<h2 style="border-bottom:2px solid #a0522d;padding-bottom:8px">' + title + '</h2>' +
    '<p style="color:#8a7e6e;font-size:0.85em;margin-top:8px">出力日: ' + new Date().toLocaleDateString('ja-JP') + ' | Choreia Expense</p>' +
    '</div>';

  // Summary
  html += '<div style="display:flex;gap:16px;margin:16px 0">' +
    '<div style="flex:1;background:#faf8f5;padding:16px;border-radius:10px;text-align:center">' +
    '<div style="font-size:1.4em;font-weight:700;color:#a0522d">¥' + total.toLocaleString() + '</div><div style="font-size:0.8em;color:#8a7e6e">合計金額</div></div>' +
    '<div style="flex:1;background:#faf8f5;padding:16px;border-radius:10px;text-align:center">' +
    '<div style="font-size:1.4em;font-weight:700;color:#a0522d">' + filtered.length + '件</div><div style="font-size:0.8em;color:#8a7e6e">取引数</div></div></div>';

  // Category breakdown
  if (catSorted.length > 0) {
    html += '<h3 style="font-size:0.95em;margin:16px 0 8px;color:#2c2418">カテゴリ別内訳</h3>';
    html += '<table class="history-table"><thead><tr><th>勘定科目</th><th style="text-align:right">金額</th><th style="text-align:right">構成比</th></tr></thead><tbody>';
    catSorted.forEach(function(entry) {
      var pct = total > 0 ? Math.round(entry[1] / total * 100) : 0;
      html += '<tr><td>' + escHtml(entry[0]) + '</td><td class="amount-cell">¥' + entry[1].toLocaleString() + '</td><td class="amount-cell">' + pct + '%</td></tr>';
    });
    html += '</tbody></table>';
  }

  // Detail table
  html += '<h3 style="font-size:0.95em;margin:24px 0 8px;color:#2c2418">明細一覧</h3>';
  html += '<table class="history-table"><thead><tr><th>日付</th><th>店名</th><th>科目</th><th>摘要</th><th style="text-align:right">金額</th></tr></thead><tbody>';
  filtered.forEach(function(r) {
    html += '<tr><td>' + escHtml(r.date) + '</td><td>' + escHtml(r.store) + '</td><td>' + escHtml(r.category) + '</td><td>' + escHtml(r.description) + '</td><td class="amount-cell">¥' + r.amount.toLocaleString() + '</td></tr>';
  });
  html += '<tr style="font-weight:700;border-top:2px solid #e8e2d9"><td colspan="4">合計</td><td class="amount-cell">¥' + total.toLocaleString() + '</td></tr>';
  html += '</tbody></table>';

  // Compliance note
  html += '<p style="font-size:0.75em;color:#8a7e6e;margin-top:16px">※ 証憑画像はGoogle Drive「Choreia Expense 証憑」フォルダに保存されています（電子帳簿保存法対応）</p>';

  var reportCard = document.getElementById('reportCard');
  reportCard.innerHTML = html;
  reportCard.style.display = 'block';
  setTimeout(function() { window.print(); reportCard.style.display = 'none'; }, 100);
}

// ==================== Tab navigation ====================
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-bar-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('panel-' + tab).classList.add('active');
  if (btn) btn.classList.add('active');
  // Auto-load dashboard when switching to it
  if (tab === 'dash' && allExpenseRows.length === 0) {
    loadDashboard();
  }
}

// ==================== Init ====================
function init() {
  setupDropArea();
  renderTemplates();
  if (typeof google !== 'undefined' && google.accounts) {
    initGIS();
  } else {
    // Wait for GIS to load
    var check = setInterval(function() {
      if (typeof google !== 'undefined' && google.accounts) {
        clearInterval(check);
        initGIS();
      }
    }, 200);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
